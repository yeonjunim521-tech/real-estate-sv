<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>데이터 운영 | 부동산 분석 PRO</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <a class="skip-link" href="#admin-main">본문으로 바로가기</a>
    <header class="admin-header">
        <a class="brand" href="/"><span>B</span><strong>부동산 분석 <em>PRO</em></strong></a>
        <p>DATA OPERATIONS</p>
    </header>

    <main id="admin-main">
        <section class="intro">
            <div><p class="eyebrow">ADMIN / DATA STATUS</p><h1>데이터 수집 상태</h1><p>최근 5년 수집 결과와 누락·품질 이슈를 조회합니다.</p></div>
            <a href="/">서비스 화면으로</a>
        </section>

        <form id="admin-form" class="filter-panel">
            <label><span>관리자 토큰</span><input id="admin-token" type="password" autocomplete="off" required></label>
            <label><span>부동산 유형</span><select id="property-type"><option value="apt">아파트</option><option value="office">오피스텔</option><option value="rhous">연립·다세대</option><option value="shous">단독·다가구</option><option value="land">토지</option></select></label>
            <label><span>지역 코드</span><input id="lawd-code" inputmode="numeric" pattern="[0-9]{5}" value="11680" maxlength="5" required></label>
            <label><span>기준 월</span><input id="deal-month" type="month" required></label>
            <button type="submit">상태 조회</button>
        </form>
        <p id="admin-status" class="status" role="status">관리자 토큰과 조회 조건을 입력해 주세요.</p>

        <section id="summary-grid" class="summary-grid" aria-label="수집 상태 요약" hidden></section>

        <div class="detail-grid">
            <section class="panel"><div class="panel-title"><div><p class="eyebrow">COVERAGE</p><h2>누락 월</h2></div><span id="coverage-label">—</span></div><div id="missing-months" class="tag-list"><p class="empty">조회 전입니다.</p></div></section>
            <section class="panel"><div class="panel-title"><div><p class="eyebrow">QUALITY</p><h2>데이터 품질 이슈</h2></div><span id="issue-count">—</span></div><div id="quality-issues"><p class="empty">조회 전입니다.</p></div></section>
        </div>

        <section class="panel"><div class="panel-title"><div><p class="eyebrow">INGESTION LOG</p><h2>최근 수집 실행</h2></div><span>최대 20건</span></div><p class="table-hint">← 좌우로 밀어 전체 항목 보기 →</p><div class="table-shell" tabindex="0" aria-label="최근 수집 실행 표, 좌우로 스크롤 가능"><table><thead><tr><th>상태</th><th>시작 시각</th><th>완료 시각</th><th>페이지</th><th>수집 건수</th><th>오류 코드</th></tr></thead><tbody id="recent-runs"><tr><td colspan="6" class="empty">조회 전입니다.</td></tr></tbody></table></div></section>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
